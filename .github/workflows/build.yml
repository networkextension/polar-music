name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: sed -i '/^replace github.com\/networkextension\/polar-sdk/d' go.mod
      - run: go mod tidy
      - run: go vet ./...
      - run: go test -race ./...
