<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Local 乐库 — Apple Music–style Starter</title>
<!--
  polar-music 本地原型 · Apple Music 风格（local-yueku-starter.html）
  ───────────────────────────────────────────────────────────────
  纯前端 / 零依赖 / 零构建 / 可离线：双击打开即用。把音乐拖进来就能听。
  目的：写后端前先把「播放器 + 乐库」UX 跑通，尤其进度条 seek
        （HTML5 <audio> + 本地 blob URL 原生支持 Range，所见即所得）。
  生产形态见 modules/polar-music/doc/music-module-design.md：
    上传 → polar-assets(Kind=media) → AssetDownloadURL 签名直连串流，
    元数据落 polar_music，AI/检索接 dock 代理。UI 形态与本页一致。
  库为会话级（刷新需重新导入）；收藏/歌单按 曲目key 持久化到 localStorage。
-->
<style>
:root{
  --bg:#ffffff;
  --sidebar-bg:rgba(245,245,247,0.6);
  --hairline:rgba(0,0,0,0.07);
  --text-primary:rgba(0,0,0,0.88);
  --text-secondary:rgba(0,0,0,0.56);
  --text-tertiary:rgba(0,0,0,0.34);
  --accent:#d60017;            /* Apple Music red */
  --accent-text:#ffffff;
  --row-hover:rgba(0,0,0,0.04);
  --art-grad:linear-gradient(135deg,#c9c9cf,#e8e8ed);
  --font:-apple-system,system-ui,"SF Pro Text","SF Pro","PingFang SC","Helvetica Neue",Helvetica,Arial,sans-serif;
  --fs-base:13px; --fs-sm:12px; --fs-section:17px; --fs-title:26px;
  --fw-regular:400; --fw-medium:500; --fw-bold:700;
  --sidebar-w:244px; --radius-pill:1000px; --radius-card:8px; --pad-page:32px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);font-size:var(--fs-base);color:var(--text-primary);background:var(--bg);overflow:hidden}
button{font-family:inherit;cursor:pointer}
.icon{width:18px;height:18px;display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.hidden{display:none!important}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;padding-bottom:92px}

/* Sidebar */
.sidebar{background:var(--sidebar-bg);border-right:.5px solid var(--hairline);padding:18px 12px;backdrop-filter:blur(20px);display:flex;flex-direction:column;overflow:hidden}
.logo{font-size:21px;font-weight:var(--fw-bold);margin:4px 12px 18px;display:flex;align-items:center;gap:7px;color:var(--accent)}
.logo svg{width:22px;height:22px;fill:var(--accent)}
.logo .sub{color:var(--text-tertiary);font-size:11px;font-weight:500;border:1px solid var(--hairline);padding:1px 6px;border-radius:20px;margin-left:2px}
.searchbox{position:relative;margin:0 6px 14px}
.searchbox input{width:100%;background:rgba(0,0,0,0.05);border:none;border-radius:8px;padding:7px 10px 7px 30px;font-size:var(--fs-base);outline:none;color:var(--text-primary)}
.searchbox svg{position:absolute;left:9px;top:8px;color:var(--text-secondary)}
.nav{display:flex;flex-direction:column;gap:1px}
.nav a{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:8px;color:var(--text-primary);text-decoration:none;font-size:var(--fs-base);font-weight:var(--fw-medium)}
.nav a:hover{background:var(--row-hover)}
.nav a.active{color:var(--accent)}
.nav a.active svg{color:var(--accent)}
.nav a svg{color:var(--text-secondary)}
.nav a .ct{margin-left:auto;color:var(--text-tertiary);font-size:11px;font-weight:400}
.sechead{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-tertiary);padding:16px 12px 6px;display:flex;align-items:center}
.sechead button{margin-left:auto;background:none;border:none;color:var(--text-secondary)}
.pls{overflow:auto;flex:1}
.pls .pl{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:8px;color:var(--text-primary);font-size:var(--fs-base);font-weight:var(--fw-medium)}
.pls .pl:hover{background:var(--row-hover)}
.pls .pl.active{color:var(--accent)}
.pls .pl .ct{margin-left:auto;color:var(--text-tertiary);font-size:11px;font-weight:400}
.cta{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:34px;padding:0 16px;border-radius:var(--radius-pill);background:var(--accent);color:var(--accent-text);border:none;font-size:var(--fs-base);font-weight:600;margin:12px 6px 2px}
.cta.ghost{background:rgba(0,0,0,0.05);color:var(--text-primary)}

/* Main */
.main{padding:24px var(--pad-page) 40px;overflow:auto}
h1.page{font-size:var(--fs-title);font-weight:var(--fw-bold);margin-bottom:6px;display:flex;align-items:flex-end;gap:14px}
h1.page .pcount{font-size:var(--fs-sm);font-weight:400;color:var(--text-secondary);padding-bottom:5px}
.pageacts{display:flex;gap:8px;margin:14px 0 22px}
.pillbtn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 16px;border-radius:var(--radius-pill);background:rgba(0,0,0,0.05);border:none;color:var(--accent);font-weight:600;font-size:var(--fs-base)}
.pillbtn:hover{background:rgba(0,0,0,0.08)}
.pillbtn.solid{background:var(--accent);color:#fff}
.pillbtn.danger{color:var(--accent);margin-left:auto}
.shelf-head{display:flex;align-items:center;gap:6px;margin:26px 0 14px;font-size:var(--fs-section);font-weight:var(--fw-bold);cursor:default}
.shelf-head .chev{color:var(--text-secondary);font-weight:400}
.shelf{display:grid;grid-auto-flow:column;grid-auto-columns:174px;gap:18px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x proximity}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:20px 18px}

.card{scroll-snap-align:start;cursor:pointer}
.card .art{width:100%;aspect-ratio:1;border-radius:var(--radius-card);background:var(--art-grad);object-fit:cover;box-shadow:0 1px 4px rgba(0,0,0,.12);position:relative;overflow:hidden;display:grid;place-items:center}
.shelf .card{width:174px}
.shelf .card .art{width:174px;height:174px}
.card .art img{width:100%;height:100%;object-fit:cover}
.card .art .ph{color:rgba(255,255,255,.85);width:40px;height:40px}
.card .art .play{position:absolute;right:9px;bottom:9px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;color:#000;opacity:0;transform:translateY(6px);transition:.15s;box-shadow:0 3px 10px rgba(0,0,0,.25)}
.card:hover .art .play{opacity:1;transform:none}
.card.round .art{border-radius:50%}
.card .t{margin-top:9px;font-size:var(--fs-base);font-weight:var(--fw-medium);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .s{font-size:var(--fs-base);color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.round .t,.card.round .s{text-align:center}

/* Track table */
table{width:100%;border-collapse:collapse;margin-top:6px}
thead th{text-align:left;font-size:var(--fs-sm);font-weight:var(--fw-regular);color:var(--text-secondary);padding:8px 12px;border-bottom:.5px solid var(--hairline);position:sticky;top:0;background:var(--bg)}
thead th.r{text-align:right}
tbody td{padding:8px 12px;font-size:var(--fs-sm);border-bottom:.5px solid var(--hairline);color:var(--text-secondary)}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--row-hover)}
tbody tr.playing td{color:var(--accent)}
tbody tr.playing .eq{display:inline-flex}
.idx{width:34px;text-align:right;color:var(--text-tertiary);font-variant-numeric:tabular-nums}
.idx .eq{display:none;gap:2px;align-items:flex-end;height:13px;justify-content:center}
.idx .eq i{width:2.5px;background:var(--accent);animation:eq .8s ease-in-out infinite}
.idx .eq i:nth-child(2){animation-delay:.2s}.idx .eq i:nth-child(3){animation-delay:.4s}
@keyframes eq{0%,100%{height:4px}50%{height:13px}}
tr:hover .idx .num{display:none}
.song{display:flex;align-items:center;gap:11px}
.song .thumb{width:38px;height:38px;border-radius:5px;background:var(--art-grad);object-fit:cover;flex:none}
.song .name{font-size:var(--fs-base);color:var(--text-primary);font-weight:var(--fw-medium)}
.song .nm2{color:var(--text-secondary);font-size:11px}
td.col-name{color:var(--text-primary)}
td.time{text-align:right;width:62px;font-variant-numeric:tabular-nums}
td.fav{width:30px;text-align:center;color:var(--text-tertiary)}
td.fav.on{color:var(--accent)}
.rowact{width:40px}
.rowact button{opacity:0;background:none;border:none;color:var(--text-secondary);width:26px;height:26px;border-radius:6px}
tr:hover .rowact button{opacity:1}
.rowact button:hover{background:rgba(0,0,0,.07);color:var(--text-primary)}

/* hero header for album/artist/playlist */
.hero{display:flex;gap:22px;align-items:flex-end;margin-bottom:22px}
.hero .ha{width:184px;height:184px;border-radius:10px;background:var(--art-grad);box-shadow:0 6px 24px rgba(0,0,0,.18);object-fit:cover;flex:none;display:grid;place-items:center;overflow:hidden}
.hero.round .ha{border-radius:50%}
.hero .ha img{width:100%;height:100%;object-fit:cover}
.hero .hmeta .k{color:var(--accent);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.hero .hmeta h1{font-size:30px;font-weight:800;margin:4px 0 4px}
.hero .hmeta .by{color:var(--text-secondary);font-size:15px}

/* empty */
.empty{height:100%;display:grid;place-items:center;text-align:center}
.drop{border:2px dashed var(--hairline);border-radius:18px;padding:52px 64px;max-width:520px;transition:.2s}
.drop.hot{border-color:var(--accent);background:rgba(214,0,23,.04)}
.drop svg{color:var(--accent)}
.drop h2{margin:14px 0 6px;font-size:21px}
.drop p{color:var(--text-secondary);margin:3px 0}
.drop .row{display:flex;gap:10px;justify-content:center;margin-top:18px}

/* Player bar (floating glass pill, Apple Music) */
.player{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);width:min(1000px,calc(100vw - 32px));height:64px;display:flex;align-items:center;gap:18px;padding:0 16px;border-radius:16px;background:rgba(255,255,255,0.78);backdrop-filter:blur(28px) saturate(180%);box-shadow:0 6px 30px rgba(0,0,0,0.14),0 0 0 .5px var(--hairline);z-index:10}
.np{display:flex;align-items:center;gap:11px;width:260px;min-width:180px}
.np .cov{width:46px;height:46px;border-radius:6px;background:var(--art-grad);object-fit:cover;flex:none}
.np .meta{min-width:0}
.np .t{font-size:var(--fs-base);font-weight:var(--fw-medium);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np .a{font-size:var(--fs-sm);color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np .heart{background:none;border:none;color:var(--text-tertiary);flex:none}
.np .heart.on{color:var(--accent)}
.center{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;max-width:560px;margin:0 auto}
.transport{display:flex;align-items:center;gap:20px}
.transport button{background:none;border:none;color:var(--text-primary)}
.transport .sm{color:var(--text-secondary)}
.transport .sm.on{color:var(--accent)}
.transport .pp{width:34px;height:34px}
.seek{display:flex;align-items:center;gap:9px;width:100%}
.seek .tm{font-size:11px;color:var(--text-tertiary);width:34px;text-align:center;font-variant-numeric:tabular-nums}
.bar{flex:1;height:4px;background:rgba(0,0,0,.12);border-radius:3px;position:relative;cursor:pointer}
.bar .fill{position:absolute;left:0;top:0;bottom:0;background:var(--text-secondary);border-radius:3px;width:0}
.bar .knob{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);transform:translate(-50%,-50%);left:0;opacity:0;transition:opacity .15s}
.bar:hover .knob{opacity:1}.bar:hover .fill{background:var(--accent)}
.right{width:200px;display:flex;align-items:center;justify-content:flex-end;gap:12px}
.vol{display:flex;align-items:center;gap:8px;width:120px;color:var(--text-secondary)}
.vol .bar{height:4px}
.right .qbtn{background:none;border:none;color:var(--text-secondary)}
.right .qbtn.on{color:var(--accent)}

/* queue drawer */
.queue{position:fixed;right:16px;bottom:92px;top:auto;max-height:60vh;width:320px;background:rgba(255,255,255,0.96);backdrop-filter:blur(24px);border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.2),0 0 0 .5px var(--hairline);transform:translateY(20px) scale(.98);opacity:0;pointer-events:none;transition:.18s;z-index:11;display:flex;flex-direction:column;overflow:hidden}
.queue.open{transform:none;opacity:1;pointer-events:auto}
.queue h3{padding:14px 16px;font-size:14px;border-bottom:.5px solid var(--hairline);display:flex;align-items:center}
.queue h3 .x{margin-left:auto;background:none;border:none;color:var(--text-secondary)}
.qlist{overflow:auto;padding:6px}
.qitem{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:8px;cursor:pointer}
.qitem:hover{background:var(--row-hover)}
.qitem.on{color:var(--accent)}
.qitem img{width:34px;height:34px;border-radius:5px;object-fit:cover;background:var(--art-grad);flex:none}
.qitem .qt{min-width:0;flex:1}
.qitem .qt div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qitem .qt .a{color:var(--text-secondary);font-size:11px}

/* modal + toast */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:grid;place-items:center;z-index:30}
.modal .box{background:#fff;border-radius:14px;padding:20px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{margin-bottom:12px}
.modal .o{padding:9px 12px;border-radius:8px;cursor:pointer}
.modal .o:hover{background:var(--row-hover)}
.modal .row{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:rgba(40,40,42,.96);color:#fff;padding:9px 18px;border-radius:20px;font-size:var(--fs-base);box-shadow:0 6px 24px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.2s;z-index:40}
.toast.show{opacity:1}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);border-radius:5px;border:2px solid transparent;background-clip:content-box}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm3 6v6.2a2.3 2.3 0 11-1.2-2V9.4l-3.6.9V16a2.3 2.3 0 11-1.2-2V7.5L15 6z"/></svg>乐库<span class="sub">本地</span></div>
    <div class="searchbox">
      <svg class="icon" viewBox="0 0 24 24" style="width:16px;height:16px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" placeholder="搜索曲目 · 艺人 · 专辑">
    </div>
    <nav class="nav">
      <a data-view="home" class="active"><svg class="icon" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v9a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/></svg>主页</a>
      <a data-view="songs"><svg class="icon" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>歌曲<span class="ct" id="ctSongs">0</span></a>
      <a data-view="albums"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.4"/></svg>专辑<span class="ct" id="ctAlbums">0</span></a>
      <a data-view="artists"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>艺人<span class="ct" id="ctArtists">0</span></a>
      <a data-view="fav"><svg class="icon" viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21z"/></svg>收藏<span class="ct" id="ctFav">0</span></a>
    </nav>
    <div class="sechead">歌单 <button id="newPl" title="新建歌单"><svg class="icon" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M12 5v14M5 12h14"/></svg></button></div>
    <div class="pls" id="pls"></div>
    <button class="cta" id="add"><svg class="icon" viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff"><path d="M12 5v14M5 12h14"/></svg>添加音乐</button>
    <button class="cta ghost" id="addDir" style="margin-top:6px">选择文件夹</button>
  </aside>

  <main class="main" id="main"></main>
</div>

<!-- Player -->
<div class="player">
  <div class="np">
    <img class="cov" id="npCover" alt="">
    <div class="meta"><div class="t" id="npTitle">未在播放</div><div class="a" id="npArtist">拖拽音乐到此，或点「添加音乐」</div></div>
    <button class="heart" id="npFav" title="收藏"><svg class="icon" viewBox="0 0 24 24" style="width:17px;height:17px"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21z"/></svg></button>
  </div>
  <div class="center">
    <div class="transport">
      <button class="sm" id="shuffle" title="随机"><svg class="icon" viewBox="0 0 24 24" style="width:17px;height:17px"><path d="M16 3h5v5M4 20l17-17M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg></button>
      <button id="prev" title="上一首"><svg class="icon" viewBox="0 0 24 24" style="stroke:none;fill:currentColor"><path d="M7 6v12M9 12l9 7V5z"/></svg></button>
      <button class="pp" id="pp"><svg class="icon" id="ppIcon" viewBox="0 0 24 24" style="stroke:none;fill:currentColor;width:30px;height:30px"><path d="M8 5v14l11-7z"/></svg></button>
      <button id="next" title="下一首"><svg class="icon" viewBox="0 0 24 24" style="stroke:none;fill:currentColor"><path d="M17 6v12M15 12L6 5v14z"/></svg></button>
      <button class="sm" id="repeat" title="循环"><svg class="icon" viewBox="0 0 24 24" style="width:17px;height:17px"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg></button>
    </div>
    <div class="seek">
      <span class="tm" id="cur">0:00</span>
      <div class="bar" id="seek"><div class="fill" id="seekFill"></div><div class="knob" id="seekKnob"></div></div>
      <span class="tm" id="durt">0:00</span>
    </div>
  </div>
  <div class="right">
    <div class="vol">
      <svg class="icon" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M11 5L6 9H2v6h4l5 4zM15 9a4 4 0 010 6M18 6a8 8 0 010 12"/></svg>
      <div class="bar" id="vol"><div class="fill" id="volFill" style="width:90%"></div><div class="knob" id="volKnob" style="left:90%"></div></div>
    </div>
    <button class="qbtn" id="queueBtn" title="播放队列"><svg class="icon" viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M3 6h13M3 12h13M3 18h9M17 12v8l5-3z"/></svg></button>
  </div>
</div>

<div class="queue" id="queue">
  <h3>播放队列<button class="x" id="queueClose"><svg class="icon" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M6 6l12 12M18 6L6 18"/></svg></button></h3>
  <div class="qlist" id="qlist"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file" accept="audio/*,.mp3,.m4a,.flac,.ogg,.wav,.aac" multiple class="hidden">
<input type="file" id="fileDir" webkitdirectory directory multiple class="hidden">
<audio id="audio"></audio>

<script>
"use strict";
const A=document.getElementById('audio');
const lib=[]; let view='home', viewArg=null;
let queue=[], qpos=-1, shuffle=false, repeat=0, uid=1;
const favs=new Set(JSON.parse(localStorage.getItem('pm.favs')||'[]'));
let playlists=JSON.parse(localStorage.getItem('pm.playlists')||'[]');
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=s=>isFinite(s)&&s>0?Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'):'0:00';
const byId=id=>lib.find(t=>t.id===id);
const saveFavs=()=>localStorage.setItem('pm.favs',JSON.stringify([...favs]));
const savePls=()=>localStorage.setItem('pm.playlists',JSON.stringify(playlists));

/* ── ID3v2 (mp3) tag + APIC cover parser, offline; filename fallback ── */
async function parseMeta(file){
  const base=file.name.replace(/\.[^.]+$/,'');
  const meta={title:base,artist:'未知艺人',album:'未知专辑',albumArtist:'',track:0,year:'',genre:'',cover:null};
  const m=base.split(' - '); if(m.length>=2){meta.artist=m[0].trim();meta.title=m.slice(1).join(' - ').trim();}
  try{
    const head=new Uint8Array(await file.slice(0,1024*1024).arrayBuffer());
    if(head[0]===0x49&&head[1]===0x44&&head[2]===0x33){
      const ver=head[3], tagSize=synch(head,6); let p=10; const end=Math.min(10+tagSize,head.length);
      while(p<end-10){
        const id=String.fromCharCode(head[p],head[p+1],head[p+2],head[p+3]);
        if(!/^[A-Z0-9]{4}$/.test(id))break;
        let size=ver===4?synch(head,p+4):((head[p+4]<<24)|(head[p+5]<<16)|(head[p+6]<<8)|head[p+7])>>>0;
        if(size<=0||p+10+size>head.length)break;
        const fr=head.subarray(p+10,p+10+size);
        if(id==='APIC')meta.cover=readAPIC(fr);
        else if(id[0]==='T'){const v=readText(fr);
          if(id==='TIT2')meta.title=v||meta.title; else if(id==='TPE1')meta.artist=v||meta.artist;
          else if(id==='TPE2')meta.albumArtist=v; else if(id==='TALB')meta.album=v||meta.album;
          else if(id==='TRCK')meta.track=parseInt(v)||0; else if(id==='TYER'||id==='TDRC')meta.year=(v||'').slice(0,4);
          else if(id==='TCON')meta.genre=v;}
        p+=10+size;
      }
    }
  }catch(e){}
  if(!meta.albumArtist)meta.albumArtist=meta.artist;
  return meta;
}
const synch=(b,o)=>(b[o]<<21)|(b[o+1]<<14)|(b[o+2]<<7)|b[o+3];
function readText(fr){const enc=fr[0],d=fr.subarray(1);try{
  if(enc===1)return new TextDecoder('utf-16').decode(d).replace(/\0+$/,'');
  if(enc===2)return new TextDecoder('utf-16be').decode(d).replace(/\0+$/,'');
  if(enc===3)return new TextDecoder('utf-8').decode(d).replace(/\0+$/,'');
  return new TextDecoder('iso-8859-1').decode(d).replace(/\0+$/,'');}catch(e){return new TextDecoder().decode(d).replace(/\0+$/,'')}}
function readAPIC(fr){try{let i=1;while(fr[i]!==0&&i<fr.length)i++;const mime=new TextDecoder('iso-8859-1').decode(fr.subarray(1,i))||'image/jpeg';i++;i++;
  const enc=fr[0]; if(enc===1||enc===2){while(i<fr.length-1&&!(fr[i]===0&&fr[i+1]===0))i++;i+=2;} else {while(fr[i]!==0&&i<fr.length)i++;i++;}
  return URL.createObjectURL(new Blob([fr.subarray(i)],{type:mime}));}catch(e){return null}}
const probeDur=url=>new Promise(r=>{const a=new Audio();a.preload='metadata';a.onloadedmetadata=()=>r(a.duration||0);a.onerror=()=>r(0);a.src=url;});

/* ── import ── */
const AUDIO_RE=/\.(mp3|m4a|flac|ogg|oga|wav|aac|opus)$/i;
async function addFiles(files){
  const list=[...files].filter(f=>AUDIO_RE.test(f.name));
  if(!list.length){toast('没有识别到音频文件');return;}
  toast('正在解析 '+list.length+' 个文件…');
  for(const f of list){const key=f.name+'::'+f.size; if(lib.some(t=>t.key===key))continue;
    const url=URL.createObjectURL(f); const meta=await parseMeta(f); const dur=await probeDur(url);
    lib.push({id:uid++,key,file:f,url,dur,addedAt:Date.now(),...meta});}
  lib.sort((a,b)=>(b.addedAt-a.addedAt));
  render();renderPls();counts();
  toast('已导入，乐库共 '+lib.length+' 首');
}
$('add').onclick=()=>$('file').click();
$('addDir').onclick=()=>$('fileDir').click();
$('file').onchange=e=>{addFiles(e.target.files);e.target.value=''};
$('fileDir').onchange=e=>{addFiles(e.target.files);e.target.value=''};
let dragN=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dragN++;const d=document.querySelector('.drop');if(d)d.classList.add('hot')});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('dragleave',()=>{dragN--;if(dragN<=0){const d=document.querySelector('.drop');if(d)d.classList.remove('hot')}});
document.addEventListener('drop',async e=>{e.preventDefault();dragN=0;const d=document.querySelector('.drop');if(d)d.classList.remove('hot');
  const items=[...(e.dataTransfer.items||[])],out=[];
  const walk=en=>new Promise(res=>{ if(en.isFile)en.file(f=>{out.push(f);res()},()=>res());
    else if(en.isDirectory){const rd=en.createReader();rd.readEntries(async es=>{for(const x of es)await walk(x);res();},()=>res());} else res();});
  if(items.length&&items[0].webkitGetAsEntry){for(const it of items){const en=it.webkitGetAsEntry&&it.webkitGetAsEntry();if(en)await walk(en);}addFiles(out);}
  else addFiles(e.dataTransfer.files);
});

/* ── derived ── */
function albums(){const m=new Map();for(const t of lib){const k=t.album+'@@'+(t.albumArtist||t.artist);
  if(!m.has(k))m.set(k,{album:t.album,artist:t.albumArtist||t.artist,cover:null,tracks:[],addedAt:0});
  const a=m.get(k);a.tracks.push(t);if(!a.cover&&t.cover)a.cover=t.cover;a.addedAt=Math.max(a.addedAt,t.addedAt);}
  return [...m.values()];}
function artists(){const m=new Map();for(const t of lib){const k=t.albumArtist||t.artist;
  if(!m.has(k))m.set(k,{name:k,cover:null,tracks:[],albums:new Set()});
  const a=m.get(k);a.tracks.push(t);a.albums.add(t.album);if(!a.cover&&t.cover)a.cover=t.cover;}
  return [...m.values()].sort((a,b)=>a.name.localeCompare(b.name));}
function sf(arr,f){const q=$('q').value.trim().toLowerCase();if(!q)return arr;return arr.filter(f||(t=>(t.title+' '+t.artist+' '+t.album).toLowerCase().includes(q)));}
function counts(){$('ctSongs').textContent=lib.length;$('ctAlbums').textContent=albums().length;$('ctArtists').textContent=artists().length;$('ctFav').textContent=lib.filter(t=>favs.has(t.key)).length;}

$('q').oninput=()=>{if(view!=='songs'&&$('q').value.trim())setView('songs');else render();};

const phArt=`<svg class="icon ph" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`;
const artHTML=u=>u?`<img src="${u}" alt="">`:phArt;
const playGlyph=`<svg class="icon" viewBox="0 0 24 24" style="stroke:none;fill:currentColor;width:16px;height:16px"><path d="M8 5v14l11-7z"/></svg>`;

function render(){
  counts();const m=$('main');
  if(!lib.length){m.innerHTML=`<div class="empty"><div class="drop">
    <svg class="icon" viewBox="0 0 24 24" style="width:44px;height:44px"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <h2>把音乐拖进来</h2><p>支持 mp3 / m4a / flac / ogg / wav，自动读取标题·艺人·专辑·封面</p>
    <p style="font-size:12px;color:var(--text-tertiary)">纯本地解析，文件不离开这台电脑（生产版经 polar-assets 私有存储）</p>
    <div class="row"><button class="pillbtn solid" onclick="document.getElementById('file').click()">选择文件</button>
    <button class="pillbtn" onclick="document.getElementById('fileDir').click()">选择文件夹</button></div></div></div>`;return;}
  if(view==='home')return renderHome();
  if(view==='songs')return renderTracks(sf(lib.slice().sort(sortTrk)),{title:'歌曲',count:lib.length+' 首'});
  if(view==='fav')return renderTracks(sf(lib.filter(t=>favs.has(t.key))),{title:'收藏',count:'♥ '+lib.filter(t=>favs.has(t.key)).length+' 首'});
  if(view==='albums')return renderCards(sf(albums().sort((a,b)=>b.addedAt-a.addedAt),t=>(t.album+' '+t.artist).toLowerCase().includes($('q').value.toLowerCase())),'专辑','album');
  if(view==='artists')return renderCards(sf(artists(),t=>t.name.toLowerCase().includes($('q').value.toLowerCase())),'艺人','artist');
  if(view==='album'){const a=albums().find(x=>x.album===viewArg.album&&x.artist===viewArg.artist)||{tracks:[]};
    return renderTracks(a.tracks.slice().sort((x,y)=>x.track-y.track),{title:viewArg.album,kind:'专辑',by:viewArg.artist,cover:a.cover});}
  if(view==='artist'){const a=artists().find(x=>x.name===viewArg)||{tracks:[]};
    return renderTracks(a.tracks.slice().sort(sortTrk),{title:viewArg,kind:'艺人',by:a.tracks.length+' 首 · '+a.albums.size+' 张专辑',cover:a.cover,round:true});}
  if(view==='pl'){const pl=playlists.find(p=>p.id===viewArg);if(!pl)return setView('home');
    const ts=pl.keys.map(k=>lib.find(t=>t.key===k)).filter(Boolean);
    return renderTracks(ts,{title:pl.name,kind:'歌单',by:ts.length+' 首',pl});}
}
const sortTrk=(a,b)=>(a.albumArtist||a.artist).localeCompare(b.albumArtist||b.artist)||a.album.localeCompare(b.album)||a.track-b.track;

function renderHome(){
  const recentAlbums=albums().sort((a,b)=>b.addedAt-a.addedAt).slice(0,12);
  const recentTracks=lib.slice().sort((a,b)=>b.addedAt-a.addedAt).slice(0,8);
  let h=`<h1 class="page">主页</h1>
    <div class="pageacts"><button class="pillbtn solid" id="playAll">${playGlyph} 播放全部</button>
      <button class="pillbtn" id="shufAll"><svg class="icon" viewBox="0 0 24 24" style="width:15px;height:15px"><path d="M16 3h5v5M4 20l17-17M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg> 随机播放</button></div>
    <div class="shelf-head">最近添加 <span class="chev">›</span></div><div class="shelf">`;
  h+=recentAlbums.map((a,i)=>cardHTML(a,'album',i)).join('')+`</div>`;
  h+=`<div class="shelf-head">最近导入的歌曲</div><table><thead><tr><th class="idx">#</th><th>标题</th><th>专辑</th><th></th><th class="r">时长</th></tr></thead><tbody id="tb"></tbody></table>`;
  $('main').innerHTML=h;
  fillRows(recentTracks);
  $('playAll').onclick=()=>playList(lib.map(t=>t.id),0);
  $('shufAll').onclick=()=>{if(!shuffle)toggleShuffle();playList(lib.map(t=>t.id),Math.floor(Math.random()*lib.length));};
  bindCards();
}
function cardHTML(a,type,i){
  const round=type==='artist';
  return `<div class="card ${round?'round':''}" data-type="${type}" data-i="${i}">
    <div class="art">${artHTML(a.cover)}${type!=='artist'?`<div class="play">${playGlyph}</div>`:''}</div>
    <div class="t">${esc(type==='artist'?a.name:a.album)}</div>
    <div class="s">${esc(type==='artist'?a.tracks.length+' 首':a.artist)}</div></div>`;
}
function renderCards(data,title,type){
  $('main').innerHTML=`<h1 class="page">${title} <span class="pcount">${data.length}</span></h1><div class="grid">`+
    data.map((a,i)=>cardHTML(a,type,i)).join('')+`</div>`;
  bindCards(data,type);
}
let _cardData=null,_cardType=null;
function bindCards(data,type){
  if(data){_cardData=data;_cardType=type;}
  document.querySelectorAll('.card').forEach(c=>{
    const t=c.dataset.type, i=+c.dataset.i;
    const arr=(t===_cardType?_cardData:null)|| (t==='album'?albums().sort((a,b)=>b.addedAt-a.addedAt):artists());
    const a=arr[i]; if(!a)return;
    c.onclick=()=>t==='artist'?setView('artist',a.name):setView('album',{album:a.album,artist:a.artist});
    const pb=c.querySelector('.play'); if(pb)pb.onclick=e=>{e.stopPropagation();playList(a.tracks.map(x=>x.id),0);};
  });
}
function renderTracks(ts,h){
  const m=$('main');
  const hero=h.cover!==undefined||h.kind?`<div class="hero ${h.round?'round':''}"><div class="ha">${artHTML(h.cover)}</div>
    <div class="hmeta"><div class="k">${esc(h.kind||'')}</div><h1>${esc(h.title)}</h1><div class="by">${esc(h.by||'')}</div>
    <div class="pageacts" style="margin:16px 0 0"><button class="pillbtn solid" id="playAll">${playGlyph} 播放</button>
    <button class="pillbtn" id="shufAll"><svg class="icon" viewBox="0 0 24 24" style="width:15px;height:15px"><path d="M16 3h5v5M4 20l17-17M21 16v5h-5"/></svg> 随机</button>
    ${h.pl?`<button class="pillbtn danger" id="delPl">删除歌单</button>`:''}</div></div></div>`
   :`<h1 class="page">${esc(h.title)} <span class="pcount">${esc(h.count||'')}</span></h1>
     <div class="pageacts"><button class="pillbtn solid" id="playAll">${playGlyph} 播放全部</button>
     <button class="pillbtn" id="shufAll">随机播放</button></div>`;
  m.innerHTML=hero+`<table><thead><tr><th class="idx">#</th><th>标题</th><th>专辑</th><th></th><th class="r">时长</th></tr></thead><tbody id="tb"></tbody></table>`;
  fillRows(ts);
  const ids=ts.map(t=>t.id);
  if($('playAll'))$('playAll').onclick=()=>playList(ids,0);
  if($('shufAll'))$('shufAll').onclick=()=>{if(!shuffle)toggleShuffle();playList(ids,Math.floor(Math.random()*ids.length));};
  if($('delPl'))$('delPl').onclick=()=>{if(confirm('删除歌单「'+h.pl.name+'」？')){playlists=playlists.filter(p=>p.id!==h.pl.id);savePls();renderPls();setView('home');}};
}
function fillRows(ts){
  const tb=$('tb');const ids=ts.map(t=>t.id);
  tb.innerHTML=ts.map((t,i)=>`<tr data-id="${t.id}" class="${queue[qpos]===t.id?'playing':''}">
    <td class="idx"><span class="num">${i+1}</span><span class="eq"><i></i><i></i><i></i></span></td>
    <td class="col-name"><div class="song"><img class="thumb" src="${t.cover||''}" onerror="this.style.visibility='hidden'"><div><div class="name">${esc(t.title)}</div><div class="nm2">${esc(t.artist)}</div></div></div></td>
    <td>${esc(t.album)}</td>
    <td class="fav ${favs.has(t.key)?'on':''}" data-fav><svg class="icon" viewBox="0 0 24 24" style="width:15px;height:15px;${favs.has(t.key)?'fill:currentColor':''}"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21z"/></svg></td>
    <td class="time"><span class="dur">${fmt(t.dur)}</span></td>
    <td class="rowact"><button data-add title="加入歌单"><svg class="icon" viewBox="0 0 24 24" style="width:15px;height:15px"><path d="M12 5v14M5 12h14"/></svg></button></td></tr>`).join('');
  tb.querySelectorAll('tr').forEach((tr,i)=>{const id=+tr.dataset.id,t=byId(id);
    tr.querySelector('.col-name').onclick=()=>playList(ids,i);
    tr.querySelector('.idx').onclick=()=>playList(ids,i);
    tr.querySelector('[data-fav]').onclick=e=>{e.stopPropagation();toggleFav(t);};
    tr.querySelector('[data-add]').onclick=e=>{e.stopPropagation();addToPlaylist(t);};
  });
}

/* ── playback ── */
function playList(ids,i){queue=ids.slice();qpos=i;playCurrent();}
function playCurrent(){const t=byId(queue[qpos]);if(!t)return;
  A.src=t.url;A.play().catch(()=>{});
  $('npCover').src=t.cover||'';$('npCover').style.visibility=t.cover?'visible':'hidden';
  $('npTitle').textContent=t.title;$('npArtist').textContent=t.artist+' — '+t.album;
  syncFav(t);document.querySelectorAll('tbody tr').forEach(tr=>tr.classList.toggle('playing',+tr.dataset.id===queue[qpos]));
  renderQueue();document.title='▶ '+t.title;}
$('pp').onclick=()=>{if(!queue.length){if(lib.length)playList(lib.map(t=>t.id),0);return;}A.paused?A.play():A.pause();};
A.onplay=()=>$('ppIcon').setAttribute('d','M7 5h3.5v14H7zM13.5 5H17v14h-3.5z');
A.onpause=()=>$('ppIcon').setAttribute('d','M8 5v14l11-7z');
A.onended=()=>next(true);
function next(auto){if(!queue.length)return;
  if(repeat===2&&auto){A.currentTime=0;A.play();return;}
  if(shuffle)qpos=Math.floor(Math.random()*queue.length); else qpos++;
  if(qpos>=queue.length){if(repeat===1)qpos=0;else{qpos=queue.length-1;A.pause();return;}}
  playCurrent();}
function prev(){if(A.currentTime>3){A.currentTime=0;return;}if(qpos>0){qpos--;playCurrent();}else A.currentTime=0;}
$('next').onclick=()=>next(false);$('prev').onclick=prev;
function toggleShuffle(){shuffle=!shuffle;$('shuffle').classList.toggle('on',shuffle);}
$('shuffle').onclick=()=>{toggleShuffle();toast('随机 '+(shuffle?'开':'关'));};
$('repeat').onclick=()=>{repeat=(repeat+1)%3;$('repeat').classList.toggle('on',repeat>0);
  $('repeat').innerHTML=repeat===2?`<svg class="icon" viewBox="0 0 24 24" style="width:17px;height:17px"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/><text x="12" y="15" font-size="9" fill="currentColor" stroke="none" text-anchor="middle">1</text></svg>`:`<svg class="icon" viewBox="0 0 24 24" style="width:17px;height:17px"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>`;
  toast(['循环关闭','列表循环','单曲循环'][repeat]);};
A.ontimeupdate=()=>{if(!A.duration)return;const p=A.currentTime/A.duration*100;
  $('seekFill').style.width=p+'%';$('seekKnob').style.left=p+'%';$('cur').textContent=fmt(A.currentTime);$('durt').textContent=fmt(A.duration);};
function barSeek(bar,e,cb){const r=bar.getBoundingClientRect();let p=(e.clientX-r.left)/r.width;p=Math.max(0,Math.min(1,p));cb(p);}
$('seek').onclick=e=>barSeek($('seek'),e,p=>{if(A.duration)A.currentTime=p*A.duration;});
let seeking=false;$('seek').onmousedown=()=>seeking=true;
document.addEventListener('mousemove',e=>{if(seeking&&A.duration)barSeek($('seek'),e,p=>A.currentTime=p*A.duration);});
document.addEventListener('mouseup',()=>seeking=false);
A.volume=0.9;
$('vol').onclick=e=>barSeek($('vol'),e,p=>{A.volume=p;$('volFill').style.width=p*100+'%';$('volKnob').style.left=p*100+'%';});

/* ── favorites ── */
function toggleFav(t){favs.has(t.key)?favs.delete(t.key):favs.add(t.key);saveFavs();render();if(queue[qpos]===t.id)syncFav(t);}
function syncFav(t){const on=favs.has(t.key);const b=$('npFav');b.classList.toggle('on',on);b.querySelector('path').setAttribute('style',on?'fill:currentColor':'');}
$('npFav').onclick=()=>{const t=byId(queue[qpos]);if(t)toggleFav(t);};

/* ── playlists ── */
function renderPls(){
  $('pls').innerHTML=playlists.map(p=>`<div class="pl ${view==='pl'&&viewArg===p.id?'active':''}" data-pl="${p.id}">
    <svg class="icon" viewBox="0 0 24 24" style="width:15px;height:15px"><path d="M3 6h13M3 12h13M3 18h9M17 12v8l5-3z"/></svg>
    <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</span><span class="ct">${p.keys.length}</span></div>`).join('')
    ||`<div style="color:var(--text-tertiary);font-size:12px;padding:6px 12px">还没有歌单</div>`;
  $('pls').querySelectorAll('.pl').forEach(el=>el.onclick=()=>setView('pl',+el.dataset.pl));
}
$('newPl').onclick=()=>{const n=prompt('新建歌单名称：','我的歌单 '+(playlists.length+1));if(n){playlists.push({id:Date.now(),name:n.trim(),keys:[]});savePls();renderPls();}};
function addToPlaylist(t){
  if(!playlists.length){if(confirm('还没有歌单，现在新建？')){const n=prompt('歌单名称：','我的歌单 1');if(n){playlists.push({id:Date.now(),name:n.trim(),keys:[t.key]});savePls();renderPls();toast('已创建并加入');}}return;}
  const w=document.createElement('div');w.className='modal';
  w.innerHTML=`<div class="box"><h3>加入歌单</h3>${playlists.map(p=>`<div class="o" data-id="${p.id}">${esc(p.name)} <span style="color:var(--text-tertiary);font-size:12px">· ${p.keys.length}首</span></div>`).join('')}<div class="row"><button class="pillbtn" id="mc">取消</button></div></div>`;
  document.body.appendChild(w);w.querySelector('#mc').onclick=()=>w.remove();w.onclick=e=>{if(e.target===w)w.remove();};
  w.querySelectorAll('.o').forEach(o=>o.onclick=()=>{const p=playlists.find(x=>x.id===+o.dataset.id);if(!p.keys.includes(t.key))p.keys.push(t.key);savePls();renderPls();render();w.remove();toast('已加入「'+p.name+'」');});
}

/* ── queue drawer ── */
$('queueBtn').onclick=()=>{$('queue').classList.toggle('open');$('queueBtn').classList.toggle('on',$('queue').classList.contains('open'));};
$('queueClose').onclick=()=>{$('queue').classList.remove('open');$('queueBtn').classList.remove('on');};
function renderQueue(){$('qlist').innerHTML=queue.map((id,i)=>{const t=byId(id);if(!t)return'';
  return `<div class="qitem ${i===qpos?'on':''}" data-i="${i}"><img src="${t.cover||''}" onerror="this.style.visibility='hidden'"><div class="qt"><div>${esc(t.title)}</div><div class="a">${esc(t.artist)}</div></div><span style="color:var(--text-tertiary);font-size:11px">${fmt(t.dur)}</span></div>`;}).join('')||`<div style="color:var(--text-tertiary);padding:18px;text-align:center">队列为空</div>`;
  $('qlist').querySelectorAll('.qitem').forEach(el=>el.onclick=()=>{qpos=+el.dataset.i;playCurrent();});}

/* keyboard */
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();$('pp').click();}
  else if(e.code==='ArrowRight'&&e.shiftKey)next(false);
  else if(e.code==='ArrowLeft'&&e.shiftKey)prev();});

renderPls();render();
</script>
</body>
</html>
